<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI打酒师 · 跳海酒馆 x OpenClaw</title>
  <style>
    :root {
      --bg1: #090d18;
      --bg2: #180d2f;
      --panel: rgba(10, 16, 32, 0.72);
      --card: rgba(17, 24, 39, 0.86);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(148, 163, 184, 0.2);
      --gold: #f59e0b;
      --cyan: #38bdf8;
      --pink: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(245,158,11,0.12), transparent 28%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 55%, #070d16 100%);
      min-height: 100vh;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 22px 18px 48px;
    }
    .hero, .panel, .result-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    }
    .hero { padding: 30px 26px; margin-bottom: 18px; }
    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(245,158,11,0.12);
      color: #fcd34d;
      border: 1px solid rgba(245,158,11,0.35);
      padding: 7px 12px;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 10px; font-size: 42px; line-height: 1.06; }
    .sub { color: var(--muted); font-size: 16px; line-height: 1.85; }
    .prompt-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(15,23,42,0.72);
      border: 1px solid rgba(56,189,248,0.18);
      color: #e2e8f0;
      line-height: 1.9;
      font-size: 15px;
    }
    .prompt-title {
      color: #7dd3fc;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .panel { padding: 24px; }
    textarea {
      width: 100%;
      min-height: 180px;
      background: rgba(15,23,42,0.9);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 18px;
      padding: 18px;
      resize: vertical;
      font-size: 17px;
      line-height: 1.75;
    }
    .hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .hint-chip {
      border: 1px solid rgba(56,189,248,0.25);
      background: rgba(56,189,248,0.08);
      color: #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary { background: linear-gradient(90deg, #f59e0b, #fb7185); color: white; }
    .secondary { background: rgba(15,23,42,0.88); color: var(--muted); border: 1px solid var(--line); }
    .ghost { background: rgba(56,189,248,0.08); color: #bae6fd; border: 1px solid rgba(56,189,248,0.2); }
    .result-card { display: none; padding: 26px; margin-top: 20px; }
    .result-card.show { display: block; }
    .persona { color: #7dd3fc; font-weight: 800; margin-bottom: 8px; font-size: 14px; letter-spacing: .04em; text-transform: uppercase; }
    .headline { font-size: 32px; line-height: 1.3; color: #fde68a; margin-bottom: 14px; }
    .narrative {
      font-size: 18px;
      line-height: 1.95;
      color: #f8fafc;
      white-space: pre-wrap;
    }
    .section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); }
    .section-title { color: #7dd3fc; font-size: 13px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
    .meta { color: var(--muted); display: flex; flex-wrap: wrap; gap: 14px; font-size: 14px; }
    .bar-order {
      font-size: 18px;
      color: #fef3c7;
      line-height: 1.8;
    }
    .soft-note { margin-top: 12px; color: #fda4af; font-size: 13px; }
    @media (max-width: 768px) {
      .wrap { padding: 14px 12px 40px; }
      h1 { font-size: 34px; }
      textarea { min-height: 200px; }
      .headline { font-size: 28px; }
      .narrative { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">跳海酒馆 × OpenClaw</div>
      <h1>今晚你想喝点什么，
        不如先告诉我你现在是什么状态。</h1>
      <div class="sub">
        你不用懂酒，也不用先看菜单。像和一个真的打酒师说话一样，
        直接讲讲你今天的心情、你想认识什么样的人、你想要什么感觉。
        我会替你挑一杯更适合你今晚的酒。
      </div>
      <div class="prompt-box">
        <div class="prompt-title">你可以这样说</div>
        比如：<br>
        “我今天刚下班，有点累，但也想认识点新朋友，别太苦，别太烈。”<br>
        或者：<br>
        “我想来一杯有记忆点的，最好适合聊天开场。”
      </div>
    </div>

    <div class="panel">
      <textarea id="freeText" placeholder="你现在是什么状态？直接说一段话就行……"></textarea>
      <div class="hint-row" id="hintRow"></div>
      <div class="actions">
        <button class="primary" id="recommendBtn">让 AI 打酒师开一杯</button>
        <button class="ghost" id="surpriseBtn">我也不知道，给我一杯惊喜</button>
        <button class="secondary" id="resetBtn">重来</button>
      </div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="persona" id="persona"></div>
      <div class="headline" id="headline"></div>
      <div class="narrative" id="narrative"></div>

      <div class="section">
        <div class="section-title">去吧台可以直接这样说</div>
        <div class="bar-order" id="barOrder"></div>
      </div>

      <div class="section">
        <div class="section-title">补充信息</div>
        <div class="meta" id="meta"></div>
        <div class="soft-note" id="softNote"></div>
      </div>
    </div>
  </div>

  <script>
    const hints = [
      '今天刚下班，想放松一下，但也想跟人聊两句。',
      '我想来一杯适合认识新朋友的。',
      '别太烈，别太苦，但要有点记忆点。',
      '想要一杯适合聊天开场的。',
      '今天想喝点不一样的，最好有惊喜。'
    ];

    const hintRow = document.getElementById('hintRow');
    hintRow.innerHTML = hints.map(text => `<button class="hint-chip" data-text="${text}">${text}</button>`).join('');
    hintRow.addEventListener('click', (e) => {
      const text = e.target.getAttribute('data-text');
      if (!text) return;
      document.getElementById('freeText').value = text;
    });

    const strengthText = (level) => ({ none: '无酒精', low: '低酒精', mid: '中等酒精', high: '偏高酒精' }[level] || '未知强度');
    const priceText = (drink) => drink.priceLarge ? `¥${drink.priceSmall}/${drink.priceLarge}` : `¥${drink.priceSmall}`;

    async function recommend(payload) {
      const res = await fetch('/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      document.getElementById('resultCard').classList.add('show');
      document.getElementById('persona').textContent = data.persona;
      document.getElementById('headline').textContent = data.headline;
      document.getElementById('narrative').textContent = data.narrative;
      document.getElementById('barOrder').textContent = `给我来一杯「${data.drink.name}」吧。`;
      document.getElementById('meta').innerHTML = `
        <span>${data.drink.style}</span>
        <span>${data.drink.abv ? 'Vol ' + data.drink.abv + '%' : 'Vol 0%'}</span>
        <span>${strengthText(data.drink.strength)}</span>
        <span>${priceText(data.drink)}</span>
      `;
      document.getElementById('softNote').textContent = data.notice;
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.getElementById('recommendBtn').addEventListener('click', () => {
      recommend({ freeText: document.getElementById('freeText').value.trim() });
    });

    document.getElementById('surpriseBtn').addEventListener('click', () => {
      recommend({ freeText: '我也不知道喝什么，但想要一杯今晚会记住的。' });
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('freeText').value = '';
      document.getElementById('resultCard').classList.remove('show');
    });
  </script>
</body>
</html>
