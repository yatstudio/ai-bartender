<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI打酒师 · 跳海酒馆 x 8848.Studio x OpenClaw</title>
  <style>
    :root {
      --bg1: #090d18;
      --bg2: #180d2f;
      --panel: rgba(10, 16, 32, 0.72);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(148, 163, 184, 0.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(245,158,11,0.12), transparent 28%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 55%, #070d16 100%);
      min-height: 100vh;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 22px 18px 48px; }

    .logo-bar {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 20px;
      margin-bottom: 28px;
      padding: 4px 0 2px;
    }
    .logo-left {
      width: 112px;
      height: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 14px 30px rgba(0,0,0,0.22);
      overflow: hidden;
    }
    .logo-left img {
      width: 82%;
      height: 82%;
      object-fit: contain;
    }
    .logo-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-pair {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 0;
      background: transparent;
      border: none;
      margin-top: 18px;
    }
    .brand-x {
      font-size: 20px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
      margin: 0 2px;
    }
    .brand-8848 {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #86efac;
      line-height: 1;
      text-shadow: 0 0 12px rgba(34,197,94,0.16);
    }
    .brand-8848 .main {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: lowercase;
    }
    .brand-8848 .sub {
      margin-top: 7px;
      font-size: 10px;
      color: #4ade80;
      opacity: 0.9;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .brand-tiaohai {
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: "HanziPen SC", "Kaiti SC", "KaiTi", "STKaiti", "Marker Felt", cursive;
      font-weight: 900;
      font-size: 40px;
      line-height: 1;
      letter-spacing: 0;
      transform: rotate(-4deg);
    }
    .brand-tiaohai span {
      display: inline-block;
      padding: 0 1px;
      background: linear-gradient(180deg, #fff2b8 0%, #fdba74 38%, #fb7185 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 1.25px rgba(91, 33, 182, 0.72);
      text-shadow:
        0 2px 0 rgba(91,33,182,0.3),
        0 0 0 rgba(91,33,182,0.3),
        1.2px 1.2px 0 rgba(91,33,182,0.22),
        0 6px 16px rgba(251,113,133,0.22),
        0 0 18px rgba(253,186,116,0.18);
    }
    .brand-tiaohai span:nth-child(1) { transform: rotate(-10deg) translateY(-2px) scale(1.02, 1.08); }
    .brand-tiaohai span:nth-child(2) { transform: rotate(5deg) translateY(2px) scale(0.98, 1.06); }
    .brand-tiaohai span:nth-child(3) { transform: rotate(-6deg) translateY(-1px) scale(1.03, 1.04); }
    .brand-tiaohai span:nth-child(4) { transform: rotate(7deg) translateY(1px) scale(1.00, 1.07); }
    .logo-divider {
      width: 1px;
      height: 32px;
      background: rgba(148,163,184,0.3);
    }

    .hero, .panel, .result-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    }
    .hero { padding: 38px 34px 30px; margin-bottom: 18px; text-align: left; }
    .hero-kicker {
      font-size: 18px;
      line-height: 1.4;
      margin: 0 0 16px;
      color: rgba(255,255,255,0.78);
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .hero-prompt {
      font-size: 52px;
      color: #f8fafc;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -0.04em;
      max-width: 820px;
      margin: 0;
      text-shadow:
        0 2px 0 #1e3a8a,
        0 4px 0 rgba(30,58,138,0.8),
        2px 2px 0 rgba(250,204,21,0.9);
    }
    .hero-prompt .em1 {
      color: #fb7185;
      display: inline-block;
      text-shadow:
        0 2px 0 #1e3a8a,
        0 4px 0 rgba(30,58,138,0.8),
        2px 2px 0 rgba(30,58,138,0.5);
    }
    .hero-prompt .em2 {
      color: #f59e0b;
      display: inline-block;
      text-shadow:
        0 2px 0 #1e3a8a,
        0 4px 0 rgba(30,58,138,0.8),
        2px 2px 0 rgba(30,58,138,0.5);
    }
    .hero-prompt .em3 {
      color: #34d399;
      display: inline-block;
      text-shadow:
        0 2px 0 #1e3a8a,
        0 4px 0 rgba(30,58,138,0.8),
        2px 2px 0 rgba(30,58,138,0.5);
    }
    .prompt-box {
      margin-top: 22px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(15,23,42,0.72);
      border: 1px solid rgba(56,189,248,0.18);
      color: #e2e8f0;
      line-height: 1.8;
      font-size: 15px;
      text-align: left;
    }
    .prompt-title {
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .panel { padding: 24px; }
    textarea {
      width: 100%;
      min-height: 160px;
      background: rgba(15,23,42,0.9);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 18px;
      padding: 16px;
      resize: vertical;
      font-size: 17px;
      line-height: 1.75;
    }
    .hint-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .hint-chip {
      border: 1px solid rgba(56,189,248,0.25);
      background: rgba(56,189,248,0.08);
      color: #dbeafe;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    button { border: 0; border-radius: 16px; padding: 14px 18px; font-size: 15px; font-weight: 800; cursor: pointer; }
    .primary { background: linear-gradient(90deg, #f59e0b, #fb7185); color: white; }
    .secondary { background: rgba(15,23,42,0.88); color: var(--muted); border: 1px solid var(--line); }
    .ghost { background: rgba(56,189,248,0.08); color: #bae6fd; border: 1px solid rgba(56,189,248,0.2); }

    .result-card { display: none; padding: 28px 26px; margin-top: 20px; overflow: hidden; position: relative; }
    .result-card.show { display: block; }
    .result-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0a1020 0%, #140d27 100%);
      z-index: 1000;
      display: none;
      overflow: auto;
      padding: 36px 22px;
    }
    .result-overlay.show { display: block; }
    .overlay-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .overlay-close {
      position: fixed;
      right: 18px;
      top: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      z-index: 1001;
    }
    .overlay-actions {
      display: flex;
      gap: 12px;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .result-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at top, rgba(56,189,248,0.08), transparent 40%), radial-gradient(circle at bottom right, rgba(251,113,133,0.08), transparent 30%);
      pointer-events: none;
    }
    .show-stage { position: relative; z-index: 1; }
    .typing-line {
      opacity: 0; transform: translateY(8px); transition: opacity .45s ease, transform .45s ease; margin-bottom: 18px;
    }
    .typing-line.show { opacity: 1; transform: translateY(0); }
    .archetype { color: #7dd3fc; font-weight: 800; font-size: 14px; letter-spacing: .05em; text-transform: uppercase; }
    .archetype-vibe {
      color: #fcd34d; font-size: 18px; line-height: 1.8; padding: 14px 16px; border-radius: 18px;
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.18);
    }
    .headline { font-size: 34px; line-height: 1.3; color: #fde68a; }
    .reading-box, .pitch-box {
      font-size: 19px; line-height: 1.95; color: #f8fafc;
      padding: 18px 18px 18px 20px; border-left: 3px solid rgba(125,211,252,0.55);
      background: rgba(15,23,42,0.35); border-radius: 0 18px 18px 0;
      white-space: pre-wrap;
    }
    .formula {
      display: inline-block; padding: 10px 14px; border-radius: 999px; color: #dbeafe;
      background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); font-size: 14px;
    }
    .section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); }
    .section-title { color: #7dd3fc; font-size: 13px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
    .bar-order { font-size: 22px; color: #fef3c7; line-height: 1.8; }
    .meta { color: var(--muted); display: flex; flex-wrap: wrap; gap: 14px; font-size: 14px; }
    .soft-note { margin-top: 12px; color: #fda4af; font-size: 13px; }
    .loading { display: none; margin-top: 18px; color: #bae6fd; font-size: 14px; letter-spacing: .05em; text-transform: uppercase; }
    .loading.show { display: block; }
    .dots::after { content: ''; display: inline-block; width: 1.5em; text-align: left; animation: dots 1.2s steps(4,end) infinite; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }

    @media (max-width: 1024px) {
      .wrap { max-width: 900px; padding: 18px 16px 44px; }
      .hero { padding: 30px 26px 26px; }
      .hero-prompt { font-size: clamp(38px, 6vw, 46px); }
      .panel { padding: 20px; }
      textarea { min-height: 170px; }
      .result-overlay { padding: 28px 18px; }
      .overlay-close { right: 12px; top: 12px; }
      .result-card { padding: 22px 20px; }
      .headline { font-size: 30px; }
      .reading-box, .pitch-box { font-size: 18px; line-height: 1.85; }
      .bar-order { font-size: 20px; line-height: 1.7; }
    }

    @media (max-width: 768px) {
      .wrap { padding: 12px 10px 34px; }
      .logo-bar { justify-content: center; margin-bottom: 18px; }
      .logo-left { width: 72px; height: 72px; border-radius: 16px; }
      .logo-pair { gap: 8px; padding: 8px 0; margin-top: 8px; }
      .brand-x { font-size: 14px; }
      .brand-8848 .main { font-size: 20px; letter-spacing: 0.06em; }
      .brand-8848 .sub { font-size: 8px; margin-top: 4px; }
      .brand-tiaohai { font-size: 22px; }
      .hero { text-align: left; padding: 24px 14px 20px; border-radius: 18px; }
      .hero-kicker { font-size: 15px; margin-bottom: 10px; }
      .hero-prompt { font-size: 30px; line-height: 1.25; }
      .prompt-box { padding: 14px; font-size: 14px; line-height: 1.7; }
      .panel { padding: 14px; border-radius: 18px; }
      textarea { min-height: 160px; padding: 14px; font-size: 16px; line-height: 1.6; border-radius: 14px; }
      .hint-row { gap: 8px; }
      .hint-chip { font-size: 12px; padding: 7px 10px; }
      .actions { gap: 10px; }
      .actions button { width: 100%; }
      button { min-height: 46px; font-size: 14px; border-radius: 12px; }
      .result-overlay { padding: 16px 10px 24px; }
      .overlay-close { right: 10px; top: 10px; padding: 8px 12px; }
      .result-card { margin-top: 0; padding: 16px 14px; border-radius: 16px; }
      .archetype { font-size: 12px; }
      .formula { display: block; font-size: 12px; border-radius: 12px; line-height: 1.5; }
      .headline { font-size: 24px; line-height: 1.35; }
      .reading-box, .pitch-box { font-size: 16px; line-height: 1.75; padding: 14px; border-radius: 0 12px 12px 0; }
      .bar-order { font-size: 18px; line-height: 1.6; }
      .meta { gap: 8px; font-size: 13px; }
      .soft-note { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="mainWrap">
    <div class="logo-bar">
      <div class="logo-left">
        <img src="/assets/openclaw-red.png" alt="OpenClaw">
      </div>
      <div class="logo-pair">
        <div class="logo-right brand-8848">
          <div>
            <div class="main">8848.studio_</div>
            <div class="sub">loading studio_modules... 90%</div>
          </div>
        </div>
        <div class="brand-x">×</div>
        <div class="logo-right brand-tiaohai" aria-label="跳海酒馆">
          <span>跳</span><span>海</span><span>酒</span><span>馆</span>
        </div>
      </div>
    </div>

    <div class="hero">
      <div class="hero-kicker">告诉我你今晚是什么状态。</div>
      <div class="hero-prompt">你现在是什么<span class="em1">情绪</span>？想遇见什么<span class="em2">人</span>？今晚想要什么<span class="em3">感觉</span>？</div>
      <div class="prompt-box">
        <div class="prompt-title">你可以这样说</div>
        “今天刚下班，有点累，但也想认识点新朋友，别太苦。”<br>
        “我心情不太好，想喝一杯缓缓。”<br>
        “想找个能聊项目的人，最好别太烈。”
      </div>
    </div>

    <div class="panel">
      <textarea id="freeText" placeholder="把你今晚的状态说出来，比如：我今天有点累，但还想认识点人。"></textarea>
      <div class="hint-row" id="hintRow"></div>
      <div class="actions">
        <button class="primary" id="recommendBtn">让 AI 打酒师解读我</button>
        <button class="ghost" id="surpriseBtn">我说不上来，你帮我判断</button>
        <button class="secondary" id="resetBtn">重来</button>
      </div>
      <div class="loading" id="loadingText">AI 打酒师正在读你的状态<span class="dots"></span></div>
      <div class="loading" id="errorText" style="display:none;color:#fca5a5;">推荐暂时不可用，请检查页面资源是否完整加载。</div>
    </div>

  </div>

  <div class="result-overlay" id="resultOverlay">
    <button class="overlay-close" id="closeOverlay">返回</button>
    <div class="overlay-inner">
      <div class="result-card show" id="overlayCard">
        <div class="show-stage">
          <div class="typing-line archetype" id="archetype"></div>
          <div class="typing-line"><span class="formula" id="formula"></span></div>
          <div class="typing-line reading-box" id="opening"></div>
          <div class="typing-line reading-box" id="breakdown"></div>
          <div class="typing-line headline" id="bridge"></div>
          <div class="typing-line pitch-box" id="bartenderPitch"></div>
          <div class="typing-line section" id="orderSection">
            <div class="section-title">去吧台可以直接这样说</div>
            <div class="bar-order" id="barOrder"></div>
          </div>
          <div class="typing-line section" id="metaSection">
            <div class="section-title">补充信息</div>
            <div class="meta" id="meta"></div>
            <div class="soft-note" id="softNote"></div>
            <div class="overlay-actions">
              <button class="secondary" id="backHomeBtn">返回首页</button>
              <button class="ghost" id="retryBtn">重来一次</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const hints = [
      '今天刚下班，想放松一下，但也想跟人聊两句。',
      '我今天心情不太好，想喝一杯缓缓。',
      '别太烈，别太苦，但要有点记忆点。',
      '想要一杯适合聊天开场的。',
      '我想找个能聊项目的人，清爽一点。'
    ];
    const hintRow = document.getElementById('hintRow');
    hintRow.innerHTML = hints.map(text => `<button class="hint-chip" data-text="${text}">${text}</button>`).join('');
    hintRow.addEventListener('click', (e) => {
      const text = e.target.getAttribute('data-text');
      if (!text) return;
      document.getElementById('freeText').value = text;
    });

    const archetypes = [
      { key: 'moon-drifter', name: '月亮漂流型', formula: '疲惫感 × 轻社交欲 × 低压入口', triggers: ['relax', 'talk', 'light'], drinks: ['春夏', '海边假日', '山野曼波', '0糖皮尔森'] },
      { key: 'spark-hunter', name: '火花猎手型', formula: '新鲜感 × 记忆点 × 可开场', triggers: ['surprise', 'talk'], drinks: ['醋不及防', '不止苏梅', '花海巡游蜜瓜龙', '屑橙2.0'] },
      { key: 'signal-sender', name: '信号发射型', formula: '社交意图 × 好入口 × 柔和辨识度', triggers: ['talk', 'light'], drinks: ['香波精灵', '马冬莓', '鲜榨乌龙荔枝啵啵', '海边假日'] },
      { key: 'idea-summoner', name: '灵感召唤型', formula: '表达欲 × 清醒度 × 话题延展性', triggers: ['project', 'fresh'], drinks: ['嬉皮小子', '西海岸的梦', '日出的人'] },
      { key: 'velvet-celebrant', name: '丝绒庆典型', formula: '仪式感 × 微醺感 × 视觉存在感', triggers: ['celebrate', 'surprise'], drinks: ['不止苏梅', '一次重逢', '西海岸的梦'] },
      { key: 'soft-healer', name: '软糖治愈型', formula: '甜口安全感 × 降低门槛 × 被温柔接住', triggers: ['sweet', 'light'], drinks: ['马冬莓', '泰奶减法酪', '鲜榨乌龙荔枝啵啵'] },
      { key: 'quiet-observer', name: '安静观察型', formula: '低存在感 × 慢进入 × 给自己留余地', triggers: ['solo', 'light'], drinks: ['春夏', '0糖皮尔森', '听涛'] },
      { key: 'bitter-speaker', name: '苦口表达型', formula: '苦感接受度 × 表达欲 × 个性边缘感', triggers: ['bitter', 'project'], drinks: ['嬉皮小子', '西海岸的梦', '一次重逢'] },
      { key: 'clean-safe', name: '干净安全型', formula: '不出错 × 长聊天 × 低负担', triggers: ['fresh', 'light'], drinks: ['0糖皮尔森', '日出的人', '春夏'] },
      { key: 'curious-roamer', name: '游牧尝鲜型', formula: '好奇心 × 风味探索 × 不想重复', triggers: ['surprise', 'sour'], drinks: ['醋不及防', '屑橙2.0', '花海巡游蜜瓜龙', '不止苏梅'] }
    ];

    let drinksCache = null;
    async function getDrinks() {
      if (drinksCache) return drinksCache;
      const res = await fetch('./drinks.json', { cache: 'no-store' });
      if (!res.ok) throw new Error(`酒单加载失败 HTTP ${res.status}`);
      drinksCache = await res.json();
      return drinksCache;
    }

    const narrativeHistory = new Set();
    const supportOpeners = [
      '我先接住你这句话，不着急下结论。你现在的状态值得被认真听见。',
      '你这句看起来轻描淡写，但情绪分量不轻，我听到了。',
      '先不用证明自己“没事”，你这句话已经把今晚的心情交代得很真实。'
    ];
    const fortuneStyles = [
      '牌面像月亮逆位：情绪在表层打转，真正需要的是被安放而不是被教育。',
      '今晚星盘更像风元素偏强：脑子很清醒，心却还在找落点。',
      '你这段话的运势信号是“先稳后亮”：先让自己落地，再去点燃场子。'
    ];
    const therapistMirrors = [
      '如果把你这句话拆开看，核心不是“喝什么”，而是“我今晚想怎么被对待”。',
      '你不是要一个标准答案，你是在找一个既不压抑自己、也不失控的出口。',
      '你现在更像在寻求“可控的温柔刺激”，既想活过来，又不想被推过头。'
    ];
    const bridgeTemplates = [
      '综合你这句的情绪纹理，我会把今晚主推荐落在「{name}」。',
      '如果由我来替你递第一杯，我会先给你「{name}」，它更贴你当下的频率。',
      '今晚这局，最像你的开场键是「{name}」。'
    ];
    const orderTemplates = [
      '去吧台直接说：我今晚状态有点复杂，先给我一杯「{name}」。',
      '你可以这样点：先来「{name}」，我想慢慢进入状态。',
      '开口就这一句：麻烦给我一杯「{name}」，我想先把情绪放下来。'
    ];

    function hashText(text) {
      let h = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return () => {
        t += 0x6D2B79F5;
        let v = Math.imul(t ^ (t >>> 15), 1 | t);
        v ^= v + Math.imul(v ^ (v >>> 7), 61 | v);
        return ((v ^ (v >>> 14)) >>> 0) / 4294967296;
      };
    }

    function pickOne(arr, rng) {
      return arr[Math.floor(rng() * arr.length)];
    }

    function inferIntent(text) {
      const t = (text || '').toLowerCase();
      return {
        wantsLight: /不想太烈|别太烈|低一点|轻一点|好入口|别太上头/.test(t),
        wantsSweet: /甜|奶|草莓|荔枝|柔和|好喝/.test(t),
        wantsFresh: /清爽|清新|轻松|解腻|干净|稳一点/.test(t),
        wantsSour: /酸|果酸|酸甜|开胃/.test(t),
        wantsBitter: /苦|ipa|酒花|硬一点/.test(t),
        wantsTalk: /聊天|聊聊|开场|破冰|社交|认识|朋友|搭子/.test(t),
        wantsProject: /项目|产品|创业|合作|ai|工作/.test(t),
        wantsRelax: /下班|累|放松|松弛|休息|放空/.test(t),
        wantsSurprise: /不一样|惊喜|特别|记忆点|有趣/.test(t),
        wantsCelebrate: /庆祝|开心|碰杯|高兴/.test(t),
        wantsSolo: /一个人|自己待会|安静|独处/.test(t),
        gotScolded: /被老婆骂|被对象骂|被骂|吵架|委屈|难受/.test(t),
        heartTired: /烦|崩溃|emo|心累|难受|压抑/.test(t)
      };
    }

    function chooseArchetype(intent, rng) {
      const score = (a) => a.triggers.reduce((n, key) => n + ({
        relax: intent.wantsRelax, talk: intent.wantsTalk, light: intent.wantsLight, sweet: intent.wantsSweet,
        fresh: intent.wantsFresh, sour: intent.wantsSour, bitter: intent.wantsBitter, project: intent.wantsProject,
        surprise: intent.wantsSurprise, celebrate: intent.wantsCelebrate, solo: intent.wantsSolo
      }[key] ? 1 : 0), 0);
      const sorted = [...archetypes]
        .map(a => ({ a, s: score(a) }))
        .sort((x, y) => y.s - x.s);
      const top = sorted.slice(0, Math.min(3, sorted.length));
      return pickOne(top, rng).a;
    }

    function inferMbti(intent, text, rng) {
      let e = 0; let i = 0; let s = 0; let n = 0; let t = 0; let f = 0; let j = 0; let p = 0;
      if (intent.wantsTalk) e += 2; if (intent.wantsSolo) i += 3;
      if (intent.wantsFresh || intent.wantsLight) s += 1; if (intent.wantsSurprise || /灵感|未来|可能性/.test(text)) n += 2;
      if (intent.wantsProject || intent.wantsBitter) t += 2; if (intent.heartTired || intent.gotScolded || intent.wantsSweet) f += 2;
      if (intent.wantsLight || intent.wantsFresh) j += 1; if (intent.wantsSurprise || intent.wantsCelebrate) p += 2;
      e += rng() > 0.5 ? 1 : 0; i += rng() > 0.5 ? 1 : 0;
      s += rng() > 0.5 ? 1 : 0; n += rng() > 0.5 ? 1 : 0;
      t += rng() > 0.5 ? 1 : 0; f += rng() > 0.5 ? 1 : 0;
      j += rng() > 0.5 ? 1 : 0; p += rng() > 0.5 ? 1 : 0;
      const type = `${e >= i ? 'E' : 'I'}${s >= n ? 'S' : 'N'}${t >= f ? 'T' : 'F'}${j >= p ? 'J' : 'P'}`;
      const labels = {
        INFJ: '温柔洞察者', INFP: '情绪诗人', ENFP: '火花点燃者', ENFJ: '共情引导者',
        INTJ: '冷静策划者', INTP: '逻辑漫游者', ENTJ: '目标推进者', ENTP: '观点实验家',
        ISFJ: '稳态守护者', ISFP: '感官疗愈者', ESFP: '现场氛围师', ESFJ: '关系照明者',
        ISTJ: '秩序执行者', ISTP: '问题拆解者', ESTP: '行动破局者', ESTJ: '场面掌控者'
      };
      return { type, label: labels[type] || '平衡调和者' };
    }

    function scoreDrink(drink, text, intent, archetype) {
      let score = 0;
      const allText = (text || '').toLowerCase();
      const hit = (arr, weight = 2) => arr.forEach(tag => { if (allText.includes(String(tag).toLowerCase())) score += weight; });
      hit(drink.taste, 3); hit(drink.mood, 3); hit(drink.social, 2);
      if (archetype.drinks.includes(drink.name)) score += 6;
      if (intent.wantsLight && ['none', 'low'].includes(drink.strength)) score += 6;
      if (intent.wantsLight && drink.strength === 'high') score -= 4;
      if (intent.wantsSweet && ['马冬莓', '泰奶减法酪', '鲜榨乌龙荔枝啵啵', '香波精灵'].includes(drink.name)) score += 5;
      if (intent.wantsFresh && ['春夏', '0糖皮尔森', '日出的人', '山野曼波'].includes(drink.name)) score += 5;
      if (intent.wantsSour && ['香波精灵', '海边假日', '醋不及防', '屑橙2.0', '不止苏梅'].includes(drink.name)) score += 5;
      if (intent.wantsBitter && ['嬉皮小子', '西海岸的梦', '一次重逢'].includes(drink.name)) score += 5;
      if (intent.wantsTalk && ['香波精灵', '马冬莓', '鲜榨乌龙荔枝啵啵', '海边假日', '0糖皮尔森'].includes(drink.name)) score += 4;
      if (intent.wantsProject && ['嬉皮小子', '西海岸的梦', '日出的人'].includes(drink.name)) score += 4;
      if (intent.wantsRelax && ['春夏', '海边假日', '山野曼波', '0糖皮尔森'].includes(drink.name)) score += 5;
      if (intent.wantsSurprise && ['醋不及防', '花海巡游蜜瓜龙', '不止苏梅', '屑橙2.0'].includes(drink.name)) score += 5;
      if (intent.wantsCelebrate && ['不止苏梅', '西海岸的梦', '一次重逢'].includes(drink.name)) score += 4;
      if (intent.wantsSolo && ['春夏', '听涛', '0糖皮尔森'].includes(drink.name)) score += 4;
      if (intent.gotScolded && ['春夏', '马冬莓', '海边假日', '泰奶减法酪'].includes(drink.name)) score += 5;
      if (intent.heartTired && ['春夏', '海边假日', '听涛'].includes(drink.name)) score += 4;
      return score;
    }

    function notice(drink, archetype, mbti) {
      const strength = drink.strength === 'high' ? '这杯酒精度偏高，建议慢一点喝。' : drink.strength === 'none' ? '这杯是无酒精选项，适合想保持清醒但又想参与气氛的时候。' : drink.strength === 'low' ? '这杯低酒精、好入口，比较适合先接住情绪。' : '这杯整体比较稳，适合边喝边聊。';
      return `${archetype.name}｜${mbti.type} ${mbti.label}。${strength}`;
    }

    function pickDrink(ranked, rng) {
      if (!ranked.length) return null;
      const seen = new Set();
      const unique = ranked.filter(x => {
        if (seen.has(x.drink.name)) return false;
        seen.add(x.drink.name);
        return true;
      });
      const pool = unique.slice(0, Math.min(6, unique.length));
      return pickOne(pool, rng).drink;
    }

    function buildNarrative(text, intent, archetype, mbti, drink, rng) {
      const o1 = pickOne(supportOpeners, rng);
      const o2 = pickOne(fortuneStyles, rng);
      const o3 = pickOne(therapistMirrors, rng);
      const opening = `${o1}\n\n${o2}`;

      const emotionalFocus = intent.gotScolded
        ? '你现在最需要的不是“讲道理”，而是先把委屈放下。'
        : intent.heartTired
          ? '你在用理性撑住疲惫，所以今晚更需要一杯能让身心同步降速的入口。'
          : intent.wantsTalk
            ? '你其实想被看见，也想保留体面，所以这杯酒要能让你自然开口。'
            : '你要的不是喝醉，而是一个能慢慢回到自己的节奏。';

      const breakdown = `${o3}\n\n${emotionalFocus}\n\n16型人格倾向先给你定在 ${mbti.type}（${mbti.label}）：这类状态通常需要“被理解 + 可控表达”同时在线。`;
      const bridge = pickOne(bridgeTemplates, rng).replace('{name}', drink.name);
      const bartenderPitch = `${drink.desc} 这杯和你当前的 ${archetype.name} 比较对齐，既能接住情绪，也留出交流空间。`;
      const orderLine = pickOne(orderTemplates, rng).replace('{name}', drink.name);
      return { opening, breakdown, bridge, bartenderPitch, orderLine };
    }

    async function generateRecommendation(input) {
      const drinks = await getDrinks();
      const text = (input.freeText || '').trim();
      const variant = Number(input.variant || 0);

      let attempts = 0;
      while (attempts < 8) {
        attempts += 1;
        const seed = (hashText(text || 'default') + variant * 10007 + attempts * 7919 + Math.floor(Math.random() * 1000000)) >>> 0;
        const rng = mulberry32(seed);
        const intent = inferIntent(text);
        const archetype = chooseArchetype(intent, rng);
        const mbti = inferMbti(intent, text, rng);
        const ranked = drinks
          .map(drink => ({ drink, score: scoreDrink(drink, text, intent, archetype) + Math.floor(rng() * 3) }))
          .sort((a, b) => b.score - a.score);
        const picked = pickDrink(ranked, rng) || drinks[0];
        const narrative = buildNarrative(text, intent, archetype, mbti, picked, rng);
        const signature = `${archetype.key}|${mbti.type}|${picked.name}|${narrative.opening}|${narrative.bridge}`;
        if (narrativeHistory.has(signature) && attempts < 8) continue;
        narrativeHistory.add(signature);

        return {
          archetype: `${archetype.name} · ${mbti.type}`,
          formula: `${archetype.formula}｜人格侧写：${mbti.label}`,
          opening: narrative.opening,
          breakdown: narrative.breakdown,
          bridge: narrative.bridge,
          bartenderPitch: narrative.bartenderPitch,
          drink: picked,
          orderLine: narrative.orderLine,
          notice: notice(picked, archetype, mbti)
        };
      }

      throw new Error('语料生成次数达到上限，请再点一次重来。');
    }

    const loadingText = document.getElementById('loadingText');
    const resultOverlay = document.getElementById('resultOverlay');
    let answerVariant = 0;
    const strengthText = (level) => ({ none: '无酒精', low: '低酒精', mid: '中等酒精', high: '偏高酒精' }[level] || '未知强度');
    const priceText = (drink) => drink.priceLarge ? `¥${drink.priceSmall}/${drink.priceLarge}` : `¥${drink.priceSmall}`;

    function clearShow() {
      document.querySelectorAll('.typing-line').forEach(el => el.classList.remove('show'));
    }
    function stagedReveal() {
      const ids = ['archetype', 'formula', 'opening', 'breakdown', 'bridge', 'bartenderPitch', 'orderSection', 'metaSection'];
      ids.forEach((id, idx) => setTimeout(() => document.getElementById(id).classList.add('show'), 80 + idx * 220));
    }

    async function recommend(payload) {
      const errorText = document.getElementById('errorText');
      loadingText.classList.add('show');
      errorText.style.display = 'none';
      resultOverlay.classList.remove('show');
      clearShow();

      let data;
      try {
        data = await generateRecommendation({ ...payload, variant: answerVariant });
      } catch (err) {
        loadingText.classList.remove('show');
        errorText.textContent = `推荐生成失败：${err.message}`;
        errorText.style.display = 'block';
        return;
      }

      document.getElementById('archetype').textContent = `今晚你的解读原型：${data.archetype}`;
      document.getElementById('formula').textContent = `推荐公式：${data.formula}`;
      document.getElementById('opening').textContent = data.opening;
      document.getElementById('breakdown').textContent = data.breakdown;
      document.getElementById('bridge').textContent = data.bridge;
      document.getElementById('bartenderPitch').textContent = data.bartenderPitch;
      document.getElementById('barOrder').textContent = data.orderLine;
      document.getElementById('meta').innerHTML = `
        <span>${data.drink.style}</span>
        <span>${data.drink.abv ? 'Vol ' + data.drink.abv + '%' : 'Vol 0%'}</span>
        <span>${strengthText(data.drink.strength)}</span>
        <span>${priceText(data.drink)}</span>
      `;
      document.getElementById('softNote').textContent = data.notice;

      loadingText.classList.remove('show');
      resultOverlay.classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      stagedReveal();
    }

    document.getElementById('recommendBtn').addEventListener('click', () => {
      answerVariant = 0;
      recommend({ freeText: document.getElementById('freeText').value.trim() });
    });
    document.getElementById('surpriseBtn').addEventListener('click', () => {
      answerVariant = 0;
      recommend({ freeText: '我今天心情一般，想喝一杯缓缓，但不想太烈。' });
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('freeText').value = '';
      resultOverlay.classList.remove('show');
      clearShow();
      loadingText.classList.remove('show');
      const errorText = document.getElementById('errorText');
      errorText.style.display = 'none';
    });
    function backHome() {
      resultOverlay.classList.remove('show');
      clearShow();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.getElementById('closeOverlay').addEventListener('click', backHome);
    document.getElementById('backHomeBtn').addEventListener('click', backHome);
    document.getElementById('retryBtn').addEventListener('click', () => {
      answerVariant += 1;
      const text = document.getElementById('freeText').value.trim();
      if (text) {
        recommend({ freeText: text });
      } else {
        backHome();
        document.getElementById('freeText').focus();
      }
    });
  </script>
</body>
</html>
